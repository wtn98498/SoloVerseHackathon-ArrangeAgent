<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFF7E8" />
    <path fill="#FFFFFF" stroke="#24212B" stroke-width="4" d="M72,64 H1208 A8,8 0 0 1 1216,72 V648 A8,8 0 0 1 1208,656 H72 A8,8 0 0 1 64,648 V72 A8,8 0 0 1 72,64 Z" />
  </g>
  <g id="headline">
    <text x="100" y="140" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#20C997">解决方案</text>
    <text x="100" y="210" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="54" font-weight="900" fill="#24212B">几下敲击，变成四轨乐队 loop</text>
  </g>
  <g id="flow">
    <path fill="#FF5A3D" d="M128,318 H332 A8,8 0 0 1 340,326 V446 A8,8 0 0 1 332,454 H128 A8,8 0 0 1 120,446 V326 A8,8 0 0 1 128,318 Z" />
    <text x="230" y="374" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="900" fill="#FFF7E8">敲一下</text>
    <text x="230" y="410" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#FFF7E8">大 pad 捕捉手感</text>
    <polygon points="372,364 430,386 372,408" fill="#24212B" />
    <path fill="#20C997" d="M470,318 H674 A8,8 0 0 1 682,326 V446 A8,8 0 0 1 674,454 H470 A8,8 0 0 1 462,446 V326 A8,8 0 0 1 470,318 Z" />
    <text x="572" y="374" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="900" fill="#24212B">补全</text>
    <text x="572" y="410" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#24212B">生成 8 小节四轨</text>
    <polygon points="714,364 772,386 714,408" fill="#24212B" />
    <path fill="#FFD43B" d="M812,318 H1016 A8,8 0 0 1 1024,326 V446 A8,8 0 0 1 1016,454 H812 A8,8 0 0 1 804,446 V326 A8,8 0 0 1 812,318 Z" />
    <text x="914" y="374" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="900" fill="#24212B">试听</text>
    <text x="914" y="410" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#24212B">满意后再应用</text>
  </g>
  <g id="track-strip">
    <path fill="#FF5A3D" d="M168,540 H332 A8,8 0 0 1 340,548 V574 A8,8 0 0 1 332,582 H168 A8,8 0 0 1 160,574 V548 A8,8 0 0 1 168,540 Z" />
    <text x="250" y="568" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#FFF7E8">鼓</text>
    <path fill="#20C997" d="M388,540 H552 A8,8 0 0 1 560,548 V574 A8,8 0 0 1 552,582 H388 A8,8 0 0 1 380,574 V548 A8,8 0 0 1 388,540 Z" />
    <text x="470" y="568" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#24212B">贝斯</text>
    <path fill="#FFD43B" d="M608,540 H772 A8,8 0 0 1 780,548 V574 A8,8 0 0 1 772,582 H608 A8,8 0 0 1 600,574 V548 A8,8 0 0 1 608,540 Z" />
    <text x="690" y="568" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#24212B">吉他</text>
    <path fill="#5C7CFA" d="M828,540 H992 A8,8 0 0 1 1000,548 V574 A8,8 0 0 1 992,582 H828 A8,8 0 0 1 820,574 V548 A8,8 0 0 1 828,540 Z" />
    <text x="910" y="568" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#FFF7E8">键盘</text>
  </g>
  <g id="footer">
    <text x="1180" y="626" text-anchor="end" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#6D6577">06</text>
  </g>
</svg>