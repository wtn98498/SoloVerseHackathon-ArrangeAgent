  </g>
    <text x="1064" y="238" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#FFF7E8">演示路径</text>
    <path fill="#FF5A3D" d="M1052,286 H1088 A8,8 0 0 1 1096,294 V330 A8,8 0 0 1 1088,338 H1052 A8,8 0 0 1 1044,330 V294 A8,8 0 0 1 1052,286 Z" />
    <path fill="#20C997" d="M1012,354 H1048 A8,8 0 0 1 1056,362 V398 A8,8 0 0 1 1048,406 H1012 A8,8 0 0 1 1004,398 V362 A8,8 0 0 1 1012,354 Z" />
    <path fill="#FFD43B" d="M1092,354 H1128 A8,8 0 0 1 1136,362 V398 A8,8 0 0 1 1128,406 H1092 A8,8 0 0 1 1084,398 V362 A8,8 0 0 1 1092,354 Z" />
    <path fill="#5C7CFA" d="M1052,422 H1088 A8,8 0 0 1 1096,430 V466 A8,8 0 0 1 1088,474 H1052 A8,8 0 0 1 1044,466 V430 A8,8 0 0 1 1052,422 Z" />
  </g>
  <g id="footer">
    <text x="56" y="668" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#6D6577">获奖点 · 不是更大的功能列表，而是一个评委能带走的产品瞬间</text>
    <text x="1218" y="668" text-anchor="end" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#6D6577">07</text>
  </g>
</svg>