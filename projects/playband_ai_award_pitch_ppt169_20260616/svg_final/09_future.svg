    <polygon points="354,382 400,394 354,406" fill="#24212B" />
    <path fill="#FF5A3D" d="M438,328 H640 A8,8 0 0 1 648,336 V452 A8,8 0 0 1 640,460 H438 A8,8 0 0 1 430,452 V336 A8,8 0 0 1 438,328 Z" />
