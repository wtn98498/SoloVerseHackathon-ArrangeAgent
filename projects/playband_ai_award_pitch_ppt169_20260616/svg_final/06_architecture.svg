    <text x="184" y="482" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#24212B">Agent 层：本地音乐导演 fallback + DeepSeek 边界</text>
    <text x="184" y="516" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#6D6577">先保证现场一定能补全、增能量、柔化；真实模型可以接在同一套动作之后。</text>
