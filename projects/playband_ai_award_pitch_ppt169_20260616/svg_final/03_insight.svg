    <text font-weight="900" font-size="64" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" fill="#24212B" x="86" y="214">灵感种子来自人，</text><text font-weight="900" font-size="64" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" fill="#24212B" x="86" y="300">编曲扩展交给 Agent。</text><text font-weight="700" font-size="24" font-family="Arial, Microsoft YaHei, sans-serif" fill="#6D6577" x="90" y="405">PlayBand AI 的关键不是“AI 替你做歌”，</text><text font-weight="700" font-size="24" font-family="Arial, Microsoft YaHei, sans-serif" fill="#6D6577" x="90" y="441">而是把你的那一点手感，变成可听、可见、可继续改的音乐结构。</text></g>
