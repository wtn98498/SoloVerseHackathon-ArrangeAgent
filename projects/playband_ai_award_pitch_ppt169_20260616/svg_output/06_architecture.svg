<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFF7E8"/>
  </g>
  <g id="header">
    <rect x="56" y="48" width="120" height="10" rx="5" fill="#5C7CFA"/>
    <text x="56" y="104" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="42" font-weight="900" fill="#24212B">为可靠演示而建，不是脆弱的 AI 表演</text>
    <text x="58" y="140" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#6D6577">即使没有模型 key，demo 也能跑；同时保留清晰的 DeepSeek-ready 接入边界。</text>
  </g>
  <g id="architecture-layers">
    <rect x="76" y="190" width="930" height="100" rx="8" fill="#FFFFFF" stroke="#E7DCC7" stroke-width="2"/>
    <rect x="76" y="190" width="18" height="100" rx="8" fill="#FF5A3D"/>
    <use data-icon="phosphor-duotone/monitor-play" x="120" y="218" width="44" height="44" fill="#FF5A3D"/>
    <text x="184" y="226" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#24212B">体验层：React + TypeScript</text>
    <text x="184" y="260" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#6D6577">编辑器、pad、候选卡片、钢琴卷帘式信任视图，都在浏览器里可演示。</text>
    <rect x="76" y="318" width="930" height="100" rx="8" fill="#FFFFFF" stroke="#E7DCC7" stroke-width="2"/>
    <rect x="76" y="318" width="18" height="100" rx="8" fill="#20C997"/>
    <use data-icon="phosphor-duotone/waveform" x="120" y="346" width="44" height="44" fill="#20C997"/>
    <text x="184" y="354" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#24212B">音乐层：Tone.js + 8 小节轻量 MIDI JSON</text>
    <text x="184" y="388" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#6D6577">生成结果不是一段藏起来的音频，而是 128 步事件、四条轨道、可视化可变换。</text>
    <rect x="76" y="446" width="930" height="100" rx="8" fill="#FFFFFF" stroke="#E7DCC7" stroke-width="2"/>
    <rect x="76" y="446" width="18" height="100" rx="8" fill="#5C7CFA"/>
    <use data-icon="phosphor-duotone/robot" x="120" y="474" width="44" height="44" fill="#5C7CFA"/>
    <text x="184" y="482" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#24212B">Agent 层：本地音乐导演 fallback + DeepSeek 边界</text>
    <text x="184" y="516" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#6D6577">先保证现场一定能补全、增能量、柔化；真实模型可以接在同一套动作之后。</text>
  </g>
  <g id="reliability-panel">
    <rect x="1040" y="190" width="172" height="356" rx="10" fill="#24212B"/>
    <use data-icon="phosphor-duotone/target" x="1096" y="226" width="58" height="58" fill="#FFD43B"/>
    <text x="1126" y="322" text-anchor="middle" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="56" font-weight="900" fill="#FFF7E8">Demo</text>
    <text x="1126" y="374" text-anchor="middle" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="56" font-weight="900" fill="#20C997">Safe</text>
    <text x="1126" y="426" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#FFF7E8" fill-opacity="0.72">
      <tspan x="1126" dy="0">坏网络也能演</tspan>
      <tspan x="1126" dy="28">没 key 也能跑</tspan>
      <tspan x="1126" dy="28">生成结果可检查</tspan>
    </text>
  </g>
  <g id="action-strip">
    <rect x="118" y="590" width="212" height="42" rx="8" fill="#FF5A3D"/>
    <text x="224" y="617" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="16" font-weight="700" fill="#FFF7E8">complete()</text>
    <rect x="350" y="590" width="212" height="42" rx="8" fill="#20C997"/>
    <text x="456" y="617" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="16" font-weight="700" fill="#24212B">increaseEnergy()</text>
    <rect x="582" y="590" width="212" height="42" rx="8" fill="#FFD43B"/>
    <text x="688" y="617" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="16" font-weight="700" fill="#24212B">soften()</text>
    <rect x="814" y="590" width="212" height="42" rx="8" fill="#5C7CFA"/>
    <text x="920" y="617" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="16" font-weight="700" fill="#FFF7E8">explainChanges()</text>
  </g>
  <g id="footer">
    <text x="56" y="668" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#6D6577">技术 · 产品以前端体验为主，核心对象是可播放、可视化、可验证的编曲数据</text>
    <text x="1218" y="668" text-anchor="end" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#6D6577">06</text>
  </g>
</svg>
