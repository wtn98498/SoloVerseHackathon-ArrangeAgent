<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFF7E8"/>
    <rect x="70" y="70" width="1140" height="580" rx="8" fill="#FFFFFF" stroke="#E7DCC7" stroke-width="3"/>
  </g>
  <g id="headline">
    <text x="104" y="146" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#5C7CFA">Agent 核心</text>
    <text x="104" y="218" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="52" font-weight="900" fill="#24212B">它不是“生成器”，而是音乐导演</text>
    <text x="108" y="260" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#6D6577">会听、会补、会解释，也能继续接受指挥。</text>
  </g>
  <g id="agent-loop">
    <rect x="118" y="338" width="168" height="96" rx="8" fill="#FF5A3D"/>
    <text x="202" y="378" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#FFF7E8">听见种子</text>
    <text x="202" y="408" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#FFF7E8">从敲击开始</text>
    <polygon points="312,374 358,386 312,398" fill="#24212B"/>
    <rect x="390" y="338" width="168" height="96" rx="8" fill="#20C997"/>
    <text x="474" y="378" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#24212B">补全乐队</text>
    <text x="474" y="408" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#24212B">四轨 loop</text>
    <polygon points="584,374 630,386 584,398" fill="#24212B"/>
    <rect x="662" y="338" width="168" height="96" rx="8" fill="#FFD43B"/>
    <text x="746" y="378" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#24212B">解释变化</text>
    <text x="746" y="408" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#24212B">告诉你改了什么</text>
    <polygon points="856,374 902,386 856,398" fill="#24212B"/>
    <rect x="934" y="338" width="168" height="96" rx="8" fill="#5C7CFA"/>
    <text x="1018" y="378" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#FFF7E8">继续指挥</text>
    <text x="1018" y="408" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#FFF7E8">更快 / 更柔</text>
  </g>
  <g id="proof">
    <rect x="134" y="520" width="286" height="58" rx="8" fill="#FFF7E8" stroke="#E7DCC7" stroke-width="3"/>
    <text x="277" y="557" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#24212B">不是一次性结果</text>
    <rect x="498" y="520" width="286" height="58" rx="8" fill="#FFF7E8" stroke="#E7DCC7" stroke-width="3"/>
    <text x="641" y="557" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#24212B">不是音频黑箱</text>
    <rect x="862" y="520" width="286" height="58" rx="8" fill="#FFF7E8" stroke="#E7DCC7" stroke-width="3"/>
    <text x="1005" y="557" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#24212B">不是替代创作者</text>
  </g>
  <g id="footer">
    <text x="1180" y="626" text-anchor="end" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#6D6577">08</text>
  </g>
</svg>
