<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="demoGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5A3D" stop-opacity="0.24"/>
      <stop offset="55%" stop-color="#5C7CFA" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#20C997" stop-opacity="0.22"/>
    </linearGradient>
    <clipPath id="candidateClip">
      <rect x="650" y="92" width="520" height="380" rx="8"/>
    </clipPath>
    <marker id="flowArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#FFD43B"/>
    </marker>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#24212B"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#demoGlow)"/>
  </g>
  <g id="headline">
    <text x="56" y="82" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#FFD43B">60 秒评委演示</text>
    <text x="56" y="176" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="64" font-weight="900" fill="#FFF7E8">
      <tspan x="56" dy="0">我敲了几下，</tspan>
      <tspan x="56" dy="78">它变成一支乐队。</tspan>
    </text>
    <text x="60" y="310" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#FFF7E8" fill-opacity="0.82">
      <tspan x="60" dy="0">这句话，就是评委回忆项目时</tspan>
      <tspan x="60" dy="34">最容易复述的瞬间。</tspan>
    </text>
    <rect x="60" y="386" width="430" height="72" rx="8" fill="#FFF7E8" fill-opacity="0.12" stroke="#FFF7E8" stroke-opacity="0.22"/>
    <use data-icon="phosphor-duotone/play-circle" x="88" y="404" width="36" height="36" fill="#20C997"/>
    <text x="142" y="416" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#FFD43B">在线演示</text>
    <text x="142" y="444" font-family="Consolas, Courier New, monospace" font-size="18" font-weight="700" fill="#FFF7E8">https://wenwen.zone/playband/</text>
  </g>
  <g id="screenshot">
    <rect x="626" y="68" width="568" height="428" rx="10" fill="#FFF7E8" stroke="#FFF7E8" stroke-opacity="0.42" stroke-width="2"/>
    <image href="../images/05-agent-candidate.png" x="650" y="92" width="520" height="380" preserveAspectRatio="xMidYMid meet" clip-path="url(#candidateClip)"/>
    <rect x="688" y="404" width="336" height="52" rx="8" fill="#24212B" fill-opacity="0.88"/>
    <use data-icon="phosphor-duotone/robot" x="710" y="414" width="30" height="30" fill="#FFD43B"/>
    <text x="754" y="436" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#FFF7E8">候选编曲先试听，再决定是否应用</text>
  </g>
  <g id="demo-flow">
    <rect x="78" y="552" width="248" height="70" rx="8" fill="#FF5A3D"/>
    <text x="108" y="582" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#FFF7E8" fill-opacity="0.72">01</text>
    <text x="146" y="592" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="900" fill="#FFF7E8">敲一段短鼓点</text>
    <line x1="334" y1="587" x2="396" y2="587" stroke="#FFD43B" stroke-width="4" marker-end="url(#flowArrow)"/>
    <rect x="410" y="552" width="248" height="70" rx="8" fill="#20C997"/>
    <text x="440" y="582" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#24212B" fill-opacity="0.72">02</text>
    <text x="478" y="592" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="900" fill="#24212B">捕捉进 MIDI</text>
    <line x1="666" y1="587" x2="728" y2="587" stroke="#FFD43B" stroke-width="4" marker-end="url(#flowArrow)"/>
    <rect x="742" y="552" width="248" height="70" rx="8" fill="#5C7CFA"/>
    <text x="772" y="582" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#FFF7E8" fill-opacity="0.72">03</text>
    <text x="810" y="592" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="900" fill="#FFF7E8">补全整支乐队</text>
    <line x1="998" y1="587" x2="1060" y2="587" stroke="#FFD43B" stroke-width="4" marker-end="url(#flowArrow)"/>
    <rect x="1074" y="552" width="150" height="70" rx="8" fill="#FFD43B"/>
    <text x="1096" y="582" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#24212B" fill-opacity="0.72">04</text>
    <text x="1132" y="592" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="900" fill="#24212B">继续指挥</text>
  </g>
  <g id="footer">
    <text x="56" y="674" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#FFF7E8" fill-opacity="0.58">演示 · 敲种子 → MIDI clip → Agent 候选 → 应用 → 继续指挥</text>
    <text x="1218" y="674" text-anchor="end" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#FFF7E8" fill-opacity="0.58">05</text>
  </g>
</svg>
