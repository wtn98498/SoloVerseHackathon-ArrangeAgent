<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFF7E8"/>
    <rect x="72" y="76" width="1136" height="568" rx="8" fill="#FFFFFF" stroke="#E7DCC7" stroke-width="3"/>
    <circle cx="1072" cy="132" r="54" fill="#FFD43B"/>
    <rect x="86" y="92" width="84" height="18" rx="8" fill="#20C997"/>
  </g>
  <g id="headline">
    <text x="104" y="162" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#20C997">灵感来源</text>
    <text x="104" y="238" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="56" font-weight="900" fill="#24212B">我想要的是音乐版 Cursor</text>
    <text x="108" y="286" font-family="Arial, Microsoft YaHei, sans-serif" font-size="23" font-weight="800" fill="#6D6577">不是替我创作，而是把我的直觉变成可继续修改的作品。</text>
  </g>
  <g id="inspiration-cards">
    <rect x="120" y="370" width="300" height="140" rx="8" fill="#FF5A3D"/>
    <use data-icon="phosphor-duotone/cursor-click" x="146" y="396" width="42" height="42" fill="#FFF7E8"/>
    <text x="146" y="466" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="900" fill="#FFF7E8">Cursor</text>
    <text x="146" y="496" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#FFF7E8">人写意图，Agent 补结构。</text>
    <rect x="490" y="370" width="300" height="140" rx="8" fill="#FFD43B"/>
    <use data-icon="phosphor-duotone/music-notes" x="516" y="396" width="42" height="42" fill="#24212B"/>
    <text x="516" y="466" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="900" fill="#24212B">GarageBand</text>
    <text x="516" y="496" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#24212B">好玩，但新手仍会被术语拦住。</text>
    <rect x="860" y="370" width="300" height="140" rx="8" fill="#5C7CFA"/>
    <use data-icon="phosphor-duotone/robot" x="886" y="396" width="42" height="42" fill="#FFF7E8"/>
    <text x="886" y="466" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="900" fill="#FFF7E8">AI 生成歌</text>
    <text x="886" y="496" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#FFF7E8">轻松，但人的手感消失了。</text>
  </g>
  <g id="takeaway">
    <rect x="228" y="566" width="824" height="54" rx="8" fill="#24212B"/>
    <text x="640" y="601" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="900" fill="#FFF7E8">PlayBand AI：让人先玩，再让 Agent 编曲。</text>
  </g>
  <g id="footer">
    <text x="1180" y="662" text-anchor="end" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#6D6577">03</text>
  </g>
</svg>
