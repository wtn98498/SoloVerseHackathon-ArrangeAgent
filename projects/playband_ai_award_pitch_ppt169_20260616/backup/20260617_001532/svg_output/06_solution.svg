<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFF7E8"/>
    <rect x="64" y="64" width="1152" height="592" rx="8" fill="#FFFFFF" stroke="#24212B" stroke-width="4"/>
  </g>
  <g id="headline">
    <text x="100" y="132" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#20C997">技术架构</text>
    <text x="100" y="194" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="50" font-weight="900" fill="#24212B">从手感，到可编辑的音乐结构</text>
    <text x="104" y="232" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#6D6577">浏览器优先：React 负责创作界面，Tone.js 负责播放，Agent 服务负责生成候选。</text>
  </g>
  <g id="architecture-flow">
    <rect x="104" y="296" width="174" height="104" rx="8" fill="#FF5A3D"/>
    <text x="191" y="336" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#FFF7E8">Toy UI</text>
    <text x="191" y="364" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#FFF7E8">pad / 风格 / 情绪</text>
    <polygon points="300,336 344,348 300,360" fill="#24212B"/>
    <rect x="366" y="296" width="174" height="104" rx="8" fill="#FFF7E8" stroke="#24212B" stroke-width="3"/>
    <text x="453" y="336" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#24212B">SeedPattern</text>
    <text x="453" y="364" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#6D6577">轻量 MIDI-like JSON</text>
    <polygon points="562,336 606,348 562,360" fill="#24212B"/>
    <rect x="628" y="296" width="174" height="104" rx="8" fill="#5C7CFA"/>
    <text x="715" y="336" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#FFF7E8">Agent API</text>
    <text x="715" y="364" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#FFF7E8">complete / energy</text>
    <polygon points="824,336 868,348 824,360" fill="#24212B"/>
    <rect x="890" y="296" width="174" height="104" rx="8" fill="#20C997"/>
    <text x="977" y="336" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#24212B">Candidate</text>
    <text x="977" y="364" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#24212B">试听后再应用</text>
  </g>
  <g id="architecture-layers">
    <rect x="118" y="462" width="222" height="94" rx="8" fill="#FFF7E8" stroke="#E7DCC7" stroke-width="3"/>
    <text x="142" y="494" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" font-weight="900" fill="#24212B">前端层</text>
    <text x="142" y="522" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#6D6577">四轨时间线、候选卡片</text>
    <text x="142" y="546" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#6D6577">播放指针、轻量编辑</text>
    <rect x="378" y="462" width="222" height="94" rx="8" fill="#FFF7E8" stroke="#E7DCC7" stroke-width="3"/>
    <text x="402" y="494" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" font-weight="900" fill="#24212B">数据层</text>
    <text x="402" y="522" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#6D6577">8 小节 / 128 step</text>
    <text x="402" y="546" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#6D6577">NoteEvent + DrumHit</text>
    <rect x="638" y="462" width="222" height="94" rx="8" fill="#FFF7E8" stroke="#E7DCC7" stroke-width="3"/>
    <text x="662" y="494" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" font-weight="900" fill="#24212B">编曲层</text>
    <text x="662" y="522" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#6D6577">本地确定性生成</text>
    <text x="662" y="546" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#6D6577">预留 DeepSeek 接口</text>
    <rect x="898" y="462" width="222" height="94" rx="8" fill="#FFF7E8" stroke="#E7DCC7" stroke-width="3"/>
    <text x="922" y="494" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" font-weight="900" fill="#24212B">音频层</text>
    <text x="922" y="522" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#6D6577">Tone.js 调度播放</text>
    <text x="922" y="546" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#6D6577">生成结果可听可见</text>
  </g>
  <g id="track-strip">
    <rect x="184" y="590" width="150" height="34" rx="8" fill="#FF5A3D"/>
    <text x="259" y="613" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="900" fill="#FFF7E8">鼓</text>
    <rect x="374" y="590" width="150" height="34" rx="8" fill="#20C997"/>
    <text x="449" y="613" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="900" fill="#24212B">贝斯</text>
    <rect x="564" y="590" width="150" height="34" rx="8" fill="#FFD43B"/>
    <text x="639" y="613" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="900" fill="#24212B">吉他</text>
    <rect x="754" y="590" width="150" height="34" rx="8" fill="#5C7CFA"/>
    <text x="829" y="613" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="900" fill="#FFF7E8">键盘</text>
  </g>
  <g id="footer">
    <text x="1180" y="626" text-anchor="end" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#6D6577">06</text>
  </g>
</svg>
