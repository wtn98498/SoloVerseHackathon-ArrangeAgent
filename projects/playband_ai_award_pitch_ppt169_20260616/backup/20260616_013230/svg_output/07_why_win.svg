<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFF7E8"/>
    <rect x="0" y="0" width="1280" height="720" fill="#FF5A3D" fill-opacity="0.05"/>
  </g>
  <g id="headline">
    <text x="82" y="112" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#FF5A3D">为什么值得投票</text>
    <text x="82" y="222" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="66" font-weight="900" fill="#24212B">
      <tspan x="82" dy="0">它把 AI 生成，</tspan>
      <tspan x="82" dy="82">变成了协作创作循环。</tspan>
    </text>
    <text x="86" y="348" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#6D6577">
      <tspan x="86" dy="0">评委能理解、能测试、能记住；</tspan>
      <tspan x="86" dy="36">而且现场真的能跑完。</tspan>
    </text>
  </g>
  <g id="proof-points">
    <circle cx="126" cy="486" r="16" fill="#FF5A3D"/>
    <text x="162" y="493" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#24212B">好记</text>
    <text x="226" y="493" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" fill="#6D6577">一句话复述：几下敲击变成一支乐队。</text>
    <circle cx="126" cy="548" r="16" fill="#20C997"/>
    <text x="162" y="555" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#24212B">可信</text>
    <text x="226" y="555" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" fill="#6D6577">生成的是结构化音乐数据，不是隐藏音频黑箱。</text>
    <circle cx="700" cy="486" r="16" fill="#FFD43B"/>
    <text x="736" y="493" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#24212B">稳定</text>
    <text x="800" y="493" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" fill="#6D6577">本地 fallback，不怕网络和 API key 翻车。</text>
    <circle cx="700" cy="548" r="16" fill="#5C7CFA"/>
    <text x="736" y="555" font-family="Arial, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#24212B">聚焦</text>
    <text x="800" y="555" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" fill="#6D6577">范围窄、交互真、未来空间清楚。</text>
  </g>
  <g id="side-visual">
    <rect x="990" y="118" width="148" height="148" rx="8" fill="#24212B"/>
    <use data-icon="phosphor-duotone/target" x="1034" y="150" width="60" height="60" fill="#FFD43B"/>
    <text x="1064" y="238" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#FFF7E8">演示路径</text>
    <rect x="1044" y="286" width="52" height="52" rx="8" fill="#FF5A3D"/>
    <rect x="1004" y="354" width="52" height="52" rx="8" fill="#20C997"/>
    <rect x="1084" y="354" width="52" height="52" rx="8" fill="#FFD43B"/>
    <rect x="1044" y="422" width="52" height="52" rx="8" fill="#5C7CFA"/>
  </g>
  <g id="footer">
    <text x="56" y="668" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#6D6577">获奖点 · 不是更大的功能列表，而是一个评委能带走的产品瞬间</text>
    <text x="1218" y="668" text-anchor="end" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#6D6577">07</text>
  </g>
</svg>
