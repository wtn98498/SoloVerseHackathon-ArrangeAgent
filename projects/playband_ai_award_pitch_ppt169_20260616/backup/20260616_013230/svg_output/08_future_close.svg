<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="closeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5A3D" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#5C7CFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#20C997" stop-opacity="0.24"/>
    </linearGradient>
    <marker id="roadArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#FFD43B"/>
    </marker>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#24212B"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#closeGlow)"/>
  </g>
  <g id="header">
    <text x="64" y="88" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#FFD43B">未来规划</text>
    <text x="64" y="160" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="58" font-weight="900" fill="#FFF7E8">从音乐玩具，到创作副驾驶</text>
    <text x="68" y="204" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#FFF7E8" fill-opacity="0.76">MVP 证明交互成立；下一步是在同一个安全候选循环里接入更强的音乐智能。</text>
  </g>
  <g id="roadmap">
    <rect x="70" y="282" width="238" height="174" rx="8" fill="#FFF7E8"/>
    <use data-icon="phosphor-duotone/brain" x="96" y="310" width="42" height="42" fill="#5C7CFA"/>
    <text x="96" y="380" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="900" fill="#24212B">模型编曲</text>
    <text x="96" y="414" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#6D6577">
      <tspan x="96" dy="0">更细的风格理解</tspan>
      <tspan x="96" dy="24">和 taste interpretation</tspan>
    </text>
    <line x1="318" y1="369" x2="370" y2="369" stroke="#FFD43B" stroke-width="5" marker-end="url(#roadArrow)"/>
    <rect x="386" y="282" width="238" height="174" rx="8" fill="#FFF7E8"/>
    <use data-icon="phosphor-duotone/music-notes" x="412" y="310" width="42" height="42" fill="#FF5A3D"/>
    <text x="412" y="380" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="900" fill="#24212B">风格包</text>
    <text x="412" y="414" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#6D6577">
      <tspan x="412" dy="0">lo-fi / rock / pop</tspan>
      <tspan x="412" dy="24">古风与民族乐器包</tspan>
    </text>
    <line x1="634" y1="369" x2="686" y2="369" stroke="#FFD43B" stroke-width="5" marker-end="url(#roadArrow)"/>
    <rect x="702" y="282" width="238" height="174" rx="8" fill="#FFF7E8"/>
    <use data-icon="phosphor-duotone/code" x="728" y="310" width="42" height="42" fill="#20C997"/>
    <text x="728" y="380" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="900" fill="#24212B">导出</text>
    <text x="728" y="414" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#6D6577">
      <tspan x="728" dy="0">核心 loop 稳定后</tspan>
      <tspan x="728" dy="24">支持 MIDI / stems</tspan>
    </text>
    <line x1="950" y1="369" x2="1002" y2="369" stroke="#FFD43B" stroke-width="5" marker-end="url(#roadArrow)"/>
    <rect x="1018" y="282" width="192" height="174" rx="8" fill="#FFF7E8"/>
    <use data-icon="phosphor-duotone/users" x="1044" y="310" width="42" height="42" fill="#FFD43B"/>
    <text x="1044" y="380" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="900" fill="#24212B">社区种子</text>
    <text x="1044" y="414" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#6D6577">
      <tspan x="1044" dy="0">小 riff 变成</tspan>
      <tspan x="1044" dy="24">可 remix 起点</tspan>
    </text>
  </g>
  <g id="closing-line">
    <rect x="64" y="530" width="610" height="92" rx="8" fill="#FFF7E8" fill-opacity="0.12" stroke="#FFF7E8" stroke-opacity="0.24"/>
    <text x="96" y="588" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="48" font-weight="900" fill="#FFF7E8">先玩，再编曲。</text>
    <text x="720" y="560" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" font-weight="800" fill="#FFD43B">欧比克莱歌剧院</text>
    <text x="720" y="590" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#FFF7E8">温添宁 · scala</text>
    <text x="720" y="620" font-family="Consolas, Courier New, monospace" font-size="16" font-weight="700" fill="#FFF7E8" fill-opacity="0.72">wenwen.zone/playband</text>
  </g>
  <g id="footer">
    <text x="56" y="674" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#FFF7E8" fill-opacity="0.58">收尾 · PlayBand AI 把用户留在音乐创作循环里</text>
    <text x="1218" y="674" text-anchor="end" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#FFF7E8" fill-opacity="0.58">08</text>
  </g>
</svg>
