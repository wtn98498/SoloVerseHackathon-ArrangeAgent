<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="rightFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF7E8" stop-opacity="1"/>
      <stop offset="42%" stop-color="#FFF7E8" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#FFF7E8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="screenClip">
      <rect x="725" y="108" width="455" height="332" rx="8"/>
    </clipPath>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFF7E8"/>
    <circle cx="1155" cy="86" r="82" fill="#FFD43B" fill-opacity="0.36"/>
    <circle cx="1080" cy="626" r="122" fill="#20C997" fill-opacity="0.18"/>
  </g>
  <g id="header">
    <rect x="56" y="48" width="88" height="10" rx="5" fill="#FF5A3D"/>
    <rect x="152" y="48" width="88" height="10" rx="5" fill="#20C997"/>
    <rect x="248" y="48" width="88" height="10" rx="5" fill="#FFD43B"/>
    <text x="56" y="104" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="44" font-weight="900" fill="#24212B">AI 音乐忘了第一件事：先玩起来</text>
  </g>
  <g id="problem-copy">
    <text x="58" y="168" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#6D6577">
      <tspan x="58" dy="0">音乐小白夹在两个不舒服的入口之间。</tspan>
    </text>
    <g id="door-daw">
      <rect x="58" y="224" width="292" height="188" rx="8" fill="#FFFFFF" stroke="#E7DCC7" stroke-width="2"/>
      <use data-icon="phosphor-duotone/sliders-horizontal" x="84" y="250" width="42" height="42" fill="#FF5A3D"/>
      <text x="84" y="326" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="34" font-weight="900" fill="#24212B">专业 DAW</text>
      <text x="84" y="360" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" fill="#6D6577">
        <tspan x="84" dy="0">很强，但一上来就要求</tspan>
        <tspan x="84" dy="26">懂轨道、插件、钢琴卷帘，</tspan>
        <tspan x="84" dy="26">乐趣还没开始就被劝退。</tspan>
      </text>
    </g>
    <g id="door-prompt">
      <rect x="378" y="224" width="292" height="188" rx="8" fill="#FFFFFF" stroke="#E7DCC7" stroke-width="2"/>
      <use data-icon="phosphor-duotone/robot" x="404" y="250" width="42" height="42" fill="#5C7CFA"/>
      <text x="404" y="326" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="34" font-weight="900" fill="#24212B">一句 Prompt</text>
      <text x="404" y="360" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" fill="#6D6577">
        <tspan x="404" dy="0">很简单，但跳过了人的手。</tspan>
        <tspan x="404" dy="26">歌是生成出来了，</tspan>
        <tspan x="404" dy="26">却不像“我做出来的”。</tspan>
      </text>
    </g>
    <rect x="58" y="456" width="612" height="122" rx="8" fill="#24212B"/>
    <text x="88" y="496" font-family="Arial, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#FFD43B">中间缺的那一块</text>
    <text x="88" y="536" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="800" fill="#FFF7E8">
      <tspan x="88" dy="0">人在会编曲之前，</tspan>
      <tspan fill="#20C997">早就会敲出感觉。</tspan>
    </text>
  </g>
  <g id="product-proof">
    <rect x="710" y="92" width="490" height="370" rx="10" fill="#FFFFFF" stroke="#E7DCC7" stroke-width="2"/>
    <image href="../images/01-start.png" x="725" y="108" width="455" height="332" preserveAspectRatio="xMidYMid meet" clip-path="url(#screenClip)"/>
    <rect x="660" y="0" width="260" height="720" fill="url(#rightFade)"/>
    <rect x="792" y="488" width="338" height="90" rx="8" fill="#FF5A3D"/>
    <use data-icon="phosphor-duotone/cursor-click" x="824" y="512" width="38" height="38" fill="#FFF7E8"/>
    <text x="878" y="522" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#FFF7E8" fill-opacity="0.78">目标用户</text>
    <text x="878" y="552" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#FFF7E8">有乐感，但不懂乐理</text>
  </g>
  <g id="footer">
    <text x="56" y="668" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#6D6577">痛点 · 黑箱生成和专业工具都没有保护普通人的“先玩一下”冲动</text>
    <text x="1218" y="668" text-anchor="end" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#6D6577">02</text>
  </g>
</svg>
