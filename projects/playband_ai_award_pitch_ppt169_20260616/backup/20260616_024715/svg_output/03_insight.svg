<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#20C997"/>
    </marker>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFF7E8"/>
    <rect x="0" y="0" width="1280" height="720" fill="#FFD43B" fill-opacity="0.08"/>
    <circle cx="112" cy="608" r="88" fill="#FF5A3D" fill-opacity="0.16"/>
    <circle cx="1140" cy="142" r="112" fill="#5C7CFA" fill-opacity="0.14"/>
  </g>
  <g id="headline">
    <text x="86" y="118" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#FF5A3D">产品洞察</text>
    <text x="86" y="214" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="64" font-weight="900" fill="#24212B">
      <tspan x="86" dy="0">灵感种子来自人，</tspan>
      <tspan x="86" dy="86">编曲扩展交给 Agent。</tspan>
    </text>
    <text x="90" y="405" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#6D6577">
      <tspan x="90" dy="0">PlayBand AI 的关键不是“AI 替你做歌”，</tspan>
      <tspan x="90" dy="36">而是把你的那一点手感，变成可听、可见、可继续改的音乐结构。</tspan>
    </text>
  </g>
  <g id="flow">
    <rect x="126" y="508" width="208" height="78" rx="39" fill="#FF5A3D"/>
    <use data-icon="phosphor-duotone/cursor-click" x="154" y="526" width="40" height="40" fill="#FFF7E8"/>
    <text x="210" y="540" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#FFF7E8">人</text>
    <text x="210" y="565" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#FFF7E8">品味 · 节奏 · 手感</text>
    <line x1="356" y1="547" x2="470" y2="547" stroke="#20C997" stroke-width="5" marker-end="url(#arrowGreen)"/>
    <rect x="496" y="508" width="232" height="78" rx="39" fill="#5C7CFA"/>
    <use data-icon="phosphor-duotone/robot" x="524" y="526" width="40" height="40" fill="#FFF7E8"/>
    <text x="580" y="540" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#FFF7E8">Agent</text>
    <text x="580" y="565" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#FFF7E8">结构 · 配器 · 变化</text>
    <line x1="750" y1="547" x2="864" y2="547" stroke="#20C997" stroke-width="5" marker-end="url(#arrowGreen)"/>
    <rect x="890" y="508" width="244" height="78" rx="39" fill="#20C997"/>
    <use data-icon="phosphor-duotone/waveform" x="918" y="526" width="40" height="40" fill="#24212B"/>
    <text x="974" y="540" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#24212B">Loop</text>
    <text x="974" y="565" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#24212B">可听 · 可见 · 可改</text>
  </g>
  <g id="track-tokens">
    <rect x="842" y="176" width="82" height="82" rx="8" fill="#FF5A3D"/>
    <text x="883" y="226" text-anchor="middle" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="26" fill="#FFF7E8">鼓</text>
    <rect x="940" y="220" width="82" height="82" rx="8" fill="#20C997"/>
    <text x="981" y="270" text-anchor="middle" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="26" fill="#24212B">贝斯</text>
    <rect x="1038" y="264" width="82" height="82" rx="8" fill="#FFD43B"/>
    <text x="1079" y="314" text-anchor="middle" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="26" fill="#24212B">吉他</text>
    <rect x="1136" y="308" width="82" height="82" rx="8" fill="#5C7CFA"/>
    <text x="1177" y="358" text-anchor="middle" font-family="Impact, Arial Black, SimHei, Microsoft YaHei, sans-serif" font-size="26" fill="#FFF7E8">键盘</text>
  </g>
  <g id="footer">
    <text x="56" y="668" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#6D6577">洞察 · AI 负责把人的小灵感放大，而不是把人从创作里拿掉</text>
    <text x="1218" y="668" text-anchor="end" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#6D6577">03</text>
  </g>
</svg>
